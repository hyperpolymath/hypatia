<!DOCTYPE html>
<html lang="{{language}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <meta name="description" content="{{description}}">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
</head>
<body>
    <nav>
        <a href="/" class="logo">Hypatia</a>
        <div class="nav-links">
            <a href="https://github.com/hyperpolymath/hypatia">Source</a>
            <a href="https://github.com/hyperpolymath/hypatia/issues">Issues</a>
        </div>
    </nav>

    <article>
        <header>
            <h1>{{title}}</h1>
            {{#if date}}<time datetime="{{date}}">{{date}}</time>{{/if}}
        </header>

        <main>
            {{content}}
        </main>

        <footer>
            <p>{{#if license}}Licensed under {{license}}{{/if}}</p>
            <p>Part of the <a href="https://github.com/hyperpolymath">hyperpolymath</a> ecosystem</p>
        </footer>
    </article>
</body>
</html>
