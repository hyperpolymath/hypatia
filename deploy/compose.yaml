# Hypatia — Full Stapeln-style compose stack
# Local development and testing environment
#
# Usage:
#   podman compose up -d          # Start all services
#   podman compose ps             # Check service health
#   podman compose logs -f engine # Follow engine logs
#   podman compose down -v        # Tear down with volumes

services:
  # ============================================================
  # DATA LAYER
  # ============================================================

  arangodb:
    image: arangodb:3.12
    container_name: hypatia-arangodb
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD:-devpassword}
      ARANGO_NO_AUTH: "0"
    ports:
      - "8529:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
      - arangodb_apps:/var/lib/arangodb3-apps
      - ./init-arangodb.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8529/_api/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - hypatia-net

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.25.5
    container_name: hypatia-dragonfly
    command: >
      --flagfile=/etc/dragonfly/dragonfly.conf
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
      - ./dragonfly/dragonfly.conf:/etc/dragonfly/dragonfly.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    ulimits:
      memlock: -1
    networks:
      - hypatia-net

  verisimdb:
    build:
      context: ../../nextgen-databases/verisimdb
      dockerfile: container/Containerfile
    container_name: hypatia-verisimdb
    environment:
      VERISIM_HOST: "[::]"
      VERISIM_PORT: 8080
      VERISIM_RUST_CORE_URL: "http://[::1]:8080/api/v1"
      ARANGODB_URL: "http://arangodb:8529"
      DRAGONFLY_URL: "redis://dragonfly:6379"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      arangodb:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    networks:
      - hypatia-net

  # ============================================================
  # REGISTRY SERVICE (Haskell)
  # ============================================================

  registry:
    build:
      context: ..
      dockerfile: deploy/Containerfile.registry
    container_name: hypatia-registry
    environment:
      ARANGODB_URL: http://arangodb:8529
      ARANGODB_DATABASE: cicd_hyper_a
      ARANGODB_USER: root
      ARANGODB_PASSWORD: ${ARANGO_ROOT_PASSWORD:-devpassword}
      DRAGONFLY_URL: redis://dragonfly:6379
      VERISIMDB_URL: http://verisimdb:8080
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      arangodb:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      verisimdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M
    networks:
      - hypatia-net

  # ============================================================
  # ELIXIR ENGINE (neural networks + rule evaluation)
  # ============================================================

  engine:
    build:
      context: ..
      dockerfile: deploy/Containerfile.engine
    container_name: hypatia-engine
    environment:
      ARANGODB_URL: http://arangodb:8529
      DRAGONFLY_URL: redis://dragonfly:6379
      VERISIMDB_URL: http://verisimdb:8080
      MIX_ENV: prod
      RELEASE_COOKIE: ${RELEASE_COOKIE:-hypatia_dev_cookie}
      ERL_FLAGS: "+P 1000000 +Q 65536"
    ports:
      - "4000:4000"
    volumes:
      - ../training-data:/app/training-data:ro
    depends_on:
      arangodb:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      verisimdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - hypatia-net

  # ============================================================
  # FORGE ADAPTERS (Rust)
  # ============================================================

  adapter:
    build:
      context: ..
      dockerfile: deploy/Containerfile.adapter
    container_name: hypatia-adapter
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      BITBUCKET_USER: ${BITBUCKET_USER}
      BITBUCKET_APP_PASSWORD: ${BITBUCKET_APP_PASSWORD}
      CODEBERG_TOKEN: ${CODEBERG_TOKEN}
      SOURCEHUT_TOKEN: ${SOURCEHUT_TOKEN}
      ARANGODB_URL: http://arangodb:8529
      DRAGONFLY_URL: redis://dragonfly:6379
      VERISIMDB_URL: http://verisimdb:8080
      ENGINE_URL: http://engine:4000
      REGISTRY_URL: http://registry:8080
    ports:
      - "8082:8081"
    depends_on:
      registry:
        condition: service_healthy
      engine:
        condition: service_started
      verisimdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M
    networks:
      - hypatia-net

  # ============================================================
  # MONITORING (Prometheus + Grafana)
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: hypatia-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - hypatia-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: hypatia-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    networks:
      - hypatia-net

networks:
  hypatia-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  arangodb_data:
  arangodb_apps:
  dragonfly_data:
  prometheus_data:
  grafana_data:
