# SPDX-License-Identifier: PMPL-1.0-or-later
# Hypatia Podman Compose — Production Overrides (Stapeln style)
# Usage: podman compose -f compose.yaml -f compose.prod.yaml up -d

services:
  # ============================================================
  # DATA LAYER — Production Settings
  # ============================================================

  arangodb:
    image: arangodb:3.12
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD:?ARANGO_ROOT_PASSWORD must be set}
      ARANGO_NO_AUTH: "0"
      ARANGODB_OVERRIDE_DETECTED_TOTAL_MEMORY: "8GB"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8529/_api/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    labels:
      - "com.hypatia.component=database"
      - "com.hypatia.tier=data"

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.25.5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
    command: >
      --maxmemory=3gb
      --proactor_threads=4
      --cache_mode=true
      --snapshot_cron=0 */6 * * *
      --dbfilename=dragonfly.rdb
      --dir=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    labels:
      - "com.hypatia.component=cache"
      - "com.hypatia.tier=data"

  verisimdb:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
      replicas: 2
    environment:
      VERISIM_HOST: "[::]"
      VERISIM_PORT: 8080
      VERISIM_RUST_CORE_URL: "http://[::1]:8080/api/v1"
      ARANGODB_URL: http://arangodb:8529
      DRAGONFLY_URL: redis://dragonfly:6379
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    labels:
      - "com.hypatia.component=federation"
      - "com.hypatia.tier=data"

  # ============================================================
  # REGISTRY SERVICE — Production Settings
  # ============================================================

  registry:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      replicas: 2
    environment:
      ARANGODB_URL: http://arangodb:8529
      ARANGODB_DATABASE: cicd_hyper_a
      ARANGODB_USER: ${ARANGODB_USER:?ARANGODB_USER must be set}
      ARANGODB_PASSWORD: ${ARANGODB_PASSWORD:?ARANGODB_PASSWORD must be set}
      DRAGONFLY_URL: redis://dragonfly:6379
      VERISIMDB_URL: http://verisimdb:8080
      PORT: 8080
      RUST_LOG: info
      RUST_BACKTRACE: 0
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    labels:
      - "com.hypatia.component=registry"
      - "com.hypatia.tier=application"

  # ============================================================
  # ELIXIR ENGINE — Production Settings
  # ============================================================

  engine:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
      replicas: 2
    environment:
      ARANGODB_URL: http://arangodb:8529
      DRAGONFLY_URL: redis://dragonfly:6379
      VERISIMDB_URL: http://verisimdb:8080
      MIX_ENV: prod
      RELEASE_COOKIE: ${RELEASE_COOKIE:?RELEASE_COOKIE must be set}
      ERL_FLAGS: "+P 1000000 +Q 65536 +SDio 128"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE must be set}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    labels:
      - "com.hypatia.component=engine"
      - "com.hypatia.tier=application"

  # ============================================================
  # FORGE ADAPTERS — Production Settings
  # ============================================================

  adapter:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      replicas: 2
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN must be set}
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      BITBUCKET_USER: ${BITBUCKET_USER}
      BITBUCKET_APP_PASSWORD: ${BITBUCKET_APP_PASSWORD}
      CODEBERG_TOKEN: ${CODEBERG_TOKEN}
      SOURCEHUT_TOKEN: ${SOURCEHUT_TOKEN}
      ARANGODB_URL: http://arangodb:8529
      DRAGONFLY_URL: redis://dragonfly:6379
      VERISIMDB_URL: http://verisimdb:8080
      ENGINE_URL: http://engine:4000
      REGISTRY_URL: http://registry:8080
      RUST_LOG: info
      RUST_BACKTRACE: 0
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    labels:
      - "com.hypatia.component=adapter"
      - "com.hypatia.tier=application"

  # ============================================================
  # API SERVICE — Production Settings
  # ============================================================

  api:
    build:
      context: ..
      dockerfile: deploy/Containerfile
    container_name: hypatia-api
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      replicas: 3
    environment:
      ARANGODB_URL: http://arangodb:8529
      ARANGODB_DATABASE: cicd_hyper_a
      ARANGODB_USER: ${ARANGODB_USER:?ARANGODB_USER must be set}
      ARANGODB_PASSWORD: ${ARANGODB_PASSWORD:?ARANGODB_PASSWORD must be set}
      DRAGONFLY_URL: redis://dragonfly:6379
      VERISIMDB_URL: http://verisimdb:8080
      REGISTRY_URL: http://registry:8080
      ENGINE_URL: http://engine:4000
      PORT: 8000
      RUST_LOG: info
      RUST_BACKTRACE: 0
    ports:
      - "8000:8000"
    depends_on:
      arangodb:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      registry:
        condition: service_healthy
      verisimdb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp:size=50M
    security_opt:
      - no-new-privileges:true
    networks:
      - hypatia-net
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    labels:
      - "com.hypatia.component=api"
      - "com.hypatia.tier=application"

  # ============================================================
  # MONITORING — Production Settings
  # ============================================================

  prometheus:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    labels:
      - "com.hypatia.component=prometheus"
      - "com.hypatia.tier=monitoring"

  grafana:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:?GRAFANA_USER must be set}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      GF_LOG_MODE: "console file"
      GF_LOG_LEVEL: "warn"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    labels:
      - "com.hypatia.component=grafana"
      - "com.hypatia.tier=monitoring"

networks:
  hypatia-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"

volumes:
  arangodb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-/var/lib/hypatia}/arangodb
  arangodb_apps:
    driver: local
  dragonfly_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-/var/lib/hypatia}/dragonfly
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-/var/lib/hypatia}/prometheus
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-/var/lib/hypatia}/grafana
