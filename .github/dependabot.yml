version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      rust-minor:
        update-types: ["minor", "patch"]

  - package-ecosystem: "cargo"
    directory: "/adapters"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/cli"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/data"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/fixer"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/integration"
    schedule:
      interval: "weekly"

  - package-ecosystem: "mix"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      elixir-minor:
        update-types: ["minor", "patch"]

