# SPDX-License-Identifier: PMPL-1.0-or-later
# Build and type-check Hypatia's Lean 4 proofs.
#
# Covers verification/proofs/lean4/*.lean (BayesianUpdate, RateLimiting).
# Complements verify-tlaplus.yml (H8 / KinGate) so BayesianUpdate (H7) and
# RateLimiting are no longer only checked by developer discretion.
#
# See PROOFS-GAP.md for the full rationale.

name: Verify Lean proofs

on:
  push:
    branches: [main, master]
    paths:
      - 'verification/proofs/lean4/**'
      - '.github/workflows/verify-lean.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'verification/proofs/lean4/**'
      - '.github/workflows/verify-lean.yml'
  schedule:
    - cron: '30 4 * * 1'   # Mondays 04:30 UTC — staggered from tlaplus
  workflow_dispatch:

permissions: read-all

jobs:
  lake-build:
    name: lake build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    env:
      ELAN_VERSION: v4.0.0
      LEAN_TOOLCHAIN: leanprover/lean4:stable

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Lean toolchain and build
        id: cache-lean
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.elan
            verification/proofs/lean4/.lake
          key: lean-${{ env.ELAN_VERSION }}-${{ env.LEAN_TOOLCHAIN }}-${{ hashFiles('verification/proofs/lean4/lakefile.lean', 'verification/proofs/lean4/*.lean') }}
          restore-keys: |
            lean-${{ env.ELAN_VERSION }}-${{ env.LEAN_TOOLCHAIN }}-

      - name: Install elan + Lean 4
        if: steps.cache-lean.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fL -o /tmp/elan-init.sh "https://raw.githubusercontent.com/leanprover/elan/${ELAN_VERSION}/elan-init.sh"
          sh /tmp/elan-init.sh -y --default-toolchain "${LEAN_TOOLCHAIN}" --no-modify-path

      - name: Put elan on PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: lake build
        working-directory: verification/proofs/lean4
        run: |
          set -euo pipefail
          lean --version
          lake --version
          lake build

      - name: Summary
        if: always()
        run: |
          {
            echo "## Lean proof verification"
            echo ""
            echo "- Toolchain: \`${LEAN_TOOLCHAIN}\` via elan \`${ELAN_VERSION}\`"
            echo "- Proof files:"
            for f in verification/proofs/lean4/*.lean; do
              [ "$(basename "$f")" = "lakefile.lean" ] && continue
              echo "  - \`$(basename "$f")\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"
