# SPDX-License-Identifier: PMPL-1.0-or-later
# Type-check Hypatia's Idris 2 proofs.
#
# Covers verification/proofs/idris2/*.idr — seven standalone proof files
# (ConfidenceBounds, DispatchStrategy, BatchRollback, NeuralConsensus,
# SafetyTriangle, Quarantine, VerisimdbConnector). These files have
# `%default total` and no shared ipkg, so each is checked independently
# via `idris2 --check`.
#
# Builds Idris 2 from source the first time a new version is pinned,
# then caches `/usr/local/{bin,lib}/idris2*` for subsequent runs.
#
# See PROOFS-GAP.md for the full rationale.

name: Verify Idris proofs

on:
  push:
    branches: [main, master]
    paths:
      - 'verification/proofs/idris2/**'
      - 'pack.toml'
      - '.github/workflows/verify-idris.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'verification/proofs/idris2/**'
      - 'pack.toml'
      - '.github/workflows/verify-idris.yml'
  schedule:
    - cron: '0 5 * * 1'   # Mondays 05:00 UTC — staggered from lean
  workflow_dispatch:

permissions: read-all

jobs:
  type-check:
    name: idris2 --check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    env:
      IDRIS2_VERSION: v0.7.0

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Chez Scheme
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y chezscheme

      - name: Cache Idris 2 install
        id: cache-idris
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /usr/local/bin/idris2
            /usr/local/lib/idris2
            ~/.idris2
          key: idris2-${{ env.IDRIS2_VERSION }}-${{ runner.os }}

      - name: Build Idris 2 from source
        if: steps.cache-idris.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${IDRIS2_VERSION}" \
            https://github.com/idris-lang/Idris2 /tmp/idris2
          cd /tmp/idris2
          make bootstrap SCHEME=chezscheme
          sudo make install PREFIX=/usr/local
          idris2 --version

      - name: Verify Idris is on PATH
        run: idris2 --version

      - name: Type-check every .idr proof file
        working-directory: verification/proofs/idris2
        run: |
          set -euo pipefail
          failed=0
          for f in *.idr; do
            echo "── $f ─────────────────────────────────────────────"
            if idris2 --check "$f"; then
              echo "✓ $f"
            else
              echo "✗ $f"
              failed=$((failed + 1))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed Idris proof file(s) failed to type-check"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Idris 2 proof verification"
            echo ""
            echo "- Toolchain: Idris 2 \`${IDRIS2_VERSION}\` (from source, Chez Scheme backend)"
            echo "- Proof files checked:"
            for f in verification/proofs/idris2/*.idr; do
              echo "  - \`$(basename "$f")\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"
