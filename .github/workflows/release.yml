# SPDX-License-Identifier: MPL-2.0
# Consolidated workflow (behaviour-preserving merge).
# Merged from: container.yml, release.yml
name: Release & Container

on:
  push: null
  workflow_dispatch: null

permissions: read-all

# Restored after #258 ("consolidate 37 workflows → 23") dropped it: the merge
# moved the container jobs out of container.yml into this file, but env: is
# file-scoped and didn't travel with them, leaving env.REGISTRY/env.IMAGE_NAME
# undefined (breaking ghcr login/metadata/push tags + the attest subject-name).
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if prerelease
          if [[ "$VERSION" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

          echo "Version: $VERSION"

  # ============================================================================
  # Build Rust Binaries
  # ============================================================================

  build-rust:
    name: Build Rust - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: hyper
            archive: tar.gz
          # Linux ARM64 (cross-compiled using cross-rs)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: hyper
            archive: tar.gz
            cross: true
          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: hyper
            archive: tar.gz
          # macOS ARM64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: hyper
            archive: tar.gz
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: hyper.exe
            archive: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Install cross for cross-compilation
        if: matrix.cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build CLI binary (native)
        if: ${{ !matrix.cross }}
        run: |
          cargo build --release --package hypatia-cli --target ${{ matrix.target }}

      - name: Build adapter binary (native)
        if: ${{ !matrix.cross }}
        run: |
          cargo build --release --package hypatia-adapters --target ${{ matrix.target }}

      - name: Build CLI binary (cross-compiled)
        if: matrix.cross
        run: |
          cross build --release --package hypatia-cli --target ${{ matrix.target }}

      - name: Build adapter binary (cross-compiled)
        if: matrix.cross
        run: |
          cross build --release --package hypatia-adapters --target ${{ matrix.target }}

      - name: Create archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hyper dist/
          cp target/${{ matrix.target }}/release/forge-adapter dist/ || true
          cp README.adoc LICENSE dist/
          cd dist
          tar -czvf ../hypatia-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.tar.gz *

      - name: Create archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/hyper.exe dist/
          Copy-Item target/${{ matrix.target }}/release/forge-adapter.exe dist/ -ErrorAction SilentlyContinue
          Copy-Item README.adoc,LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath hypatia-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hypatia-${{ matrix.target }}
          path: hypatia-${{ needs.prepare.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}
          retention-days: 7

  # ============================================================================
  # Build Haskell Binary
  # ============================================================================

  build-haskell:
    name: Build Haskell Registry
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [prepare]
    if: hashFiles('registry/hypatia.cabal') != '' || hashFiles('registry/hypatia.cabal') != ''
    defaults:
      run:
        working-directory: registry
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Haskell
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        id: setup
        with:
          ghc-version: '9.6'
          cabal-version: '3.10'
          cabal-update: true

      - name: Restore cached dependencies
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache
        env:
          key: ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-cabal-${{ steps.setup.outputs.cabal-version }}
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ env.key }}-plan-${{ hashFiles('registry/hypatia.cabal') }}
          restore-keys: ${{ env.key }}-

      - name: Build dependencies
        run: cabal build all --only-dependencies

      - name: Build registry
        run: cabal build exe:registry

      - name: Create distribution
        run: |
          mkdir -p dist
          cp $(cabal list-bin registry) dist/
          cp ../README.adoc ../LICENSE dist/
          cd dist
          tar -czvf ../hypatia-registry-${{ needs.prepare.outputs.version }}-x86_64-linux.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hypatia-registry-x86_64-linux
          path: registry/hypatia-registry-${{ needs.prepare.outputs.version }}-x86_64-linux.tar.gz
          retention-days: 7

  # ============================================================================
  # Build Docker Images
  # ============================================================================

  build-docker:
    name: Build Container Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [prepare, build-rust, build-haskell]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        component:
          - name: cli
            dockerfile: deploy/Containerfile
            context: .
          - name: adapter
            dockerfile: deploy/Containerfile.adapter
            context: .
          - name: registry
            dockerfile: deploy/Containerfile.registry
            context: .
          - name: engine
            dockerfile: deploy/Containerfile.engine
            context: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download Rust artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: hypatia-x86_64-*
          path: artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Container Registry
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_prerelease == 'false' }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          push: ${{ !inputs.dry_run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}

      - name: Attest container provenance
        if: ${{ !inputs.dry_run }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ============================================================================
  # Create GitHub Release
  # ============================================================================

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [prepare, build-rust, build-haskell, build-docker]
    if: ${{ !inputs.dry_run }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Generate release notes
        id: release_notes
        run: |
          cat << 'EOF' > release-notes.md
          ## Hypatia v${{ needs.prepare.outputs.version }}

          ### Components
          - **CLI** (`hyper`): Command-line interface for CI/CD operations
          - **Adapters** (`forge-adapter`): Multi-forge adapters (GitHub, GitLab, Bitbucket)
          - **Registry**: Type-safe rule registry (Haskell)
          - **Engine**: Neurosymbolic rule engine (Logtalk)

          ### Docker Images
          ```bash
          docker pull ghcr.io/${{ github.repository }}-cli:${{ needs.prepare.outputs.version }}
          docker pull ghcr.io/${{ github.repository }}-adapter:${{ needs.prepare.outputs.version }}
          docker pull ghcr.io/${{ github.repository }}-registry:${{ needs.prepare.outputs.version }}
          docker pull ghcr.io/${{ github.repository }}-engine:${{ needs.prepare.outputs.version }}
          ```

          ### Installation

          #### Linux (x86_64)
          ```bash
          curl -sSL https://github.com/${{ github.repository }}/releases/download/v${{ needs.prepare.outputs.version }}/hypatia-${{ needs.prepare.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv hyper /usr/local/bin/
          ```

          #### macOS (Apple Silicon)
          ```bash
          curl -sSL https://github.com/${{ github.repository }}/releases/download/v${{ needs.prepare.outputs.version }}/hypatia-${{ needs.prepare.outputs.version }}-aarch64-apple-darwin.tar.gz | tar xz
          sudo mv hyper /usr/local/bin/
          ```

          ### Checksums
          See `checksums.txt` for SHA256 checksums of all release artifacts.
          EOF

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2.2.1
        with:
          name: Hypatia v${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: |
            release-assets/*
          fail_on_unmatched_files: false

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'release-assets/*'

  # ============================================================================
  # Publish Haskell Package
  # ============================================================================

  publish-hackage:
    name: Publish to Hackage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [prepare, github-release]
    if: ${{ !inputs.dry_run && needs.prepare.outputs.is_prerelease == 'false' && hashFiles('registry/hypatia.cabal') != '' }}
    defaults:
      run:
        working-directory: registry
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Haskell
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        with:
          ghc-version: '9.6'
          cabal-version: '3.10'
          cabal-update: true

      - name: Build source distribution
        run: cabal sdist

      - name: Publish to Hackage
        if: env.HACKAGE_TOKEN != ''
        run: |
          cabal upload --publish dist-newstyle/sdist/*.tar.gz
        env:
          HACKAGE_TOKEN: ${{ secrets.HACKAGE_TOKEN }}
          HACKAGE_USERNAME: ${{ secrets.HACKAGE_USERNAME }}
          HACKAGE_PASSWORD: ${{ secrets.HACKAGE_TOKEN }}

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: cli
            dockerfile: deploy/Containerfile
          - name: adapter
            dockerfile: deploy/Containerfile.adapter
          - name: engine
            dockerfile: deploy/Containerfile.engine

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}

      - name: Attest container provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # NOTE: Haskell registry container removed — source directory deleted in f2fe2df
  # The hypatia-registry package on ghcr.io is now archived
