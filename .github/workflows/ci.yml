# SPDX-License-Identifier: PMPL-1.0-or-later
# Main CI workflow for hypatia
# Tests Rust (adapters, cli, fixer, data), Haskell (registry), and Logtalk (engine)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Rust Jobs (adapters, cli, fixer, data)
  # ============================================================================
  rust-check:
    name: Rust Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2.7.8
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      - name: Run cargo check
        run: cargo check --workspace --all-targets

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: [rust-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2.7.8
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Run doc tests
        run: cargo test --workspace --doc

  rust-test-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    needs: [rust-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@8d0a9443e5efb9c69e313d234a10a028eadd018c # v2.51.11
        with:
          tool: cargo-llvm-cov

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2.7.8
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5.3.1
        with:
          files: lcov.info
          flags: rust
          fail_ci_if_error: false

  # ============================================================================
  # Haskell Jobs (registry)
  # ============================================================================
  haskell-build:
    name: Haskell Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: registry
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Haskell
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        id: setup
        with:
          ghc-version: '9.6'
          cabal-version: '3.10'
          cabal-update: true

      - name: Configure build
        run: |
          cabal configure --enable-tests --enable-benchmarks --disable-documentation
          cabal build all --dry-run

      - name: Restore cached dependencies
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache
        env:
          key: ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-cabal-${{ steps.setup.outputs.cabal-version }}
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ env.key }}-plan-${{ hashFiles('registry/cicd-hyper-a.cabal') }}
          restore-keys: ${{ env.key }}-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: cabal build all --only-dependencies

      - name: Save cached dependencies
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ steps.cache.outputs.cache-primary-key }}

      - name: Build
        run: cabal build all

      - name: Run tests
        run: cabal test all

      - name: Check documentation
        run: cabal haddock all

  haskell-lint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup HLint
        uses: haskell-actions/hlint-setup@17f0f4093d35cfdbf02aab186d51d0bb8b92ddfa # v2.7.0
        with:
          version: '3.8'

      - name: Run HLint
        uses: haskell-actions/hlint-run@75c62c3bed4ab3e4c85c64ed8f287478c5f86ce2 # v2.4.9
        with:
          path: registry/
          fail-on: warning

  # ============================================================================
  # K9iser — validates the contract manifest and emits k9 artefacts.
  # DOG-04 from testing-and-benchmarking/TESTING-TAXONOMY.adoc § VII.
  #
  # Validates k9iser.toml parses cleanly and every declared source path
  # exists. If the `k9iser` CLI is on PATH, also runs `k9iser build`
  # and uploads the generated artefacts. Absence of the CLI is a warning,
  # not a failure — the parse + path check is the hard gate.
  # ============================================================================
  k9iser-validate:
    name: k9iser manifest + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse k9iser.toml + verify declared paths exist
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import tomllib, sys, pathlib

          with open("k9iser.toml", "rb") as fh:
              data = tomllib.load(fh)

          missing = []
          for src in data.get("source", []):
              p = pathlib.Path(src["path"])
              if not p.exists():
                  missing.append(src["path"])

          if missing:
              for m in missing:
                  print(f"::error::k9iser.toml declares missing source {m}")
              sys.exit(1)

          n = len(data.get("source", []))
          c = len(data.get("constraint", []))
          print(f"OK  k9iser.toml parses — {n} source(s), {c} constraint(s)")
          PY

      - name: Run k9iser build (if CLI available)
        run: |
          set -euo pipefail
          if command -v k9iser >/dev/null 2>&1; then
            k9iser build
            ls -la generated/k9iser/ || true
          else
            echo "::warning::k9iser CLI not on PATH — skipping build step. Install from hyperpolymath/k9iser to enable full DOG-04 enforcement."
          fi

      - name: Upload k9 artefacts
        if: hashFiles('generated/k9iser/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: k9iser-artefacts
          path: generated/k9iser/
          retention-days: 14

  # ============================================================================
  # Combined Status Check
  # ============================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs:
      - rust-check
      - rust-fmt
      - rust-test
      - rust-test-coverage
      - haskell-build
      - haskell-lint
      - k9iser-validate
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.rust-check.result }}" == "failure" ]] || \
             [[ "${{ needs.rust-fmt.result }}" == "failure" ]] || \
             [[ "${{ needs.rust-test.result }}" == "failure" ]] || \
             [[ "${{ needs.haskell-build.result }}" == "failure" ]] || \
             [[ "${{ needs.haskell-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.k9iser-validate.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI jobs passed successfully"
