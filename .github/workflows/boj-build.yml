# SPDX-License-Identifier: PMPL-1.0-or-later
name: BoJ Server Build Trigger
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions: read-all
jobs:
  trigger-boj:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Trigger BoJ Server (Casket/ssg-mcp)
        # GitHub contexts go through env so the body is built by jq with --arg,
        # not by string-concatenating ${{ ... }} into the shell. Previous form
        # inlined `github.ref_name` into the JSON payload (CWE-94 injection
        # via branch name) and shipped a malformed payload — extra `}` and
        # bad escape — that `continue-on-error: true` was masking.
        env:
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          jq -nc --arg repo "$REPO" --arg branch "$REF" \
            '{repo: $repo, branch: $branch, engine: "casket"}' \
            | curl --fail-with-body \
                   -X POST "http://boj-server.local:7700/cartridges/ssg-mcp/invoke" \
                   -H "Content-Type: application/json" \
                   --data @-
        continue-on-error: true
