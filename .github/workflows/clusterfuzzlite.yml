# SPDX-License-Identifier: MPL-2.0
# Consolidated workflow (behaviour-preserving merge).
# Merged from: cflite_batch.yml, cflite_pr.yml
name: ClusterFuzzLite

on:
  pull_request:
    paths:
    - src/**
    - crates/**
    - fuzz/**
  schedule:
  - cron: 0 2 * * 0
  workflow_dispatch: null

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-fuzzing:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Gated on the presence of fuzz targets — without `fuzz/` (cargo-fuzz)
    # or a ClusterFuzzLite OSS-Fuzz-style harness, the build_fuzzers step
    # has nothing to compile and fails. Job re-activates the moment the
    # fuzz tree lands.
    if: hashFiles('fuzz/Cargo.toml') != '' || hashFiles('.clusterfuzzlite/build.sh') != ''
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0
      - uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: rust
          sanitizer: address
      - uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: prune
          sanitizer: address

  batch-fuzzing:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: rust
          sanitizer: address
      - uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 1800
          mode: batch
          sanitizer: address
