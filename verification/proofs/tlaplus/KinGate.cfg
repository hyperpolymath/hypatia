\* TLC configuration for KinGate.tla
\*
\* Minimal bounded instance: 3 bots, 2 repos, up to 4 queued requests.
\* Sufficient for exhaustive mutual-exclusion model-checking (state space
\* ~10^5 under the defaults; finishes in seconds on a laptop).
\*
\* Run with (after installing tla2tools.jar):
\*   java -cp tla2tools.jar tlc2.TLC -config KinGate.cfg KinGate.tla

SPECIFICATION Spec

CONSTANTS
    Bots = {"rhodibot", "echidnabot", "sustainabot"}
    Repos = {"repoA", "repoB"}
    MaxRequests = 4

INVARIANTS
    KinGateSafe
    GrantsAreWellBracketed

PROPERTIES
    Liveness

CHECK_DEADLOCK FALSE
