#
# PanLL panel manifest for Hypatia.
#
# PanLL (Panel-based Local Log / Live) is hyperpolymath's unified
# dashboard — each registered system (hypatia, gitbot-fleet,
# panic-attacker, proven, etc.) shows up as a panel. Panels are minted
# via panel-minter; once minted, the manifest below tells the dashboard
# how to talk to this system.
#
# STATUS: STUB. The fields are the ones I can justify from existing
# references (stapeln.toml for ports, DESIGN-NARRATIVE.md for component
# names); the exact PanLL schema isn't in this repo and hasn't been
# visible to the drafter, so field names MUST be verified against
# `hyperpolymath/panll` (or whatever the repo is called) before this
# file is trusted to register a panel.
#
# Once the real schema is known, this file either gets aligned with it
# or is regenerated by panel-minter.

[panel]
id = "hypatia"
name = "Hypatia"
description = "Neurosymbolic CI/CD intelligence layer — findings routing, fleet dispatch, confidence trajectories"
version = "0.1.0"
owner = "hyperpolymath"

[endpoints]
# Match stapeln.toml's Elixir pipeline (port 9090) and forge-adapter
# (port 8081). Fields are placeholders — real schema goes here.
http = "http://localhost:9090"
forge_adapter = "http://localhost:8081"
ipc = "ws://localhost:9090/ws"

[ui]
# Gossamer-compiled wasm is the UI surface.
runtime = "gossamer"
wasm_path = "assets/wasm/hypatia_gui.wasm"
entry_module = "hypatia/ui/bridge"
entry_fn = "main"

[burble]
# TODO: Burble session integration — see bridge.eph TODO block.
# When Burble's session API is in, add:
#   session_topic = "hypatia/findings"
#   session_role = "publisher"   # or "subscriber" if Hypatia listens
